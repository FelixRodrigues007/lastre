<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>cobe isolation test</title>
    <style>
      body {
        margin: 0;
        background: #0b0f0d;
        color: #d7e4dc;
        font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
        display: flex;
        gap: 32px;
        flex-wrap: wrap;
        align-items: flex-start;
        padding: 32px;
      }
      .stage {
        width: 420px;
        height: 420px;
        /* deliberately NOT dark olive — a neutral panel so a working globe is unmistakable */
        background: #11161f;
        border: 1px solid #2a3540;
        border-radius: 16px;
        display: grid;
        place-items: center;
        position: relative;
      }
      canvas {
        width: 400px;
        height: 400px;
      }
      pre {
        margin: 0;
        white-space: pre-wrap;
        max-width: 560px;
      }
      .ok {
        color: #7fdca0;
      }
      .bad {
        color: #ff8f8f;
      }
      h1 {
        font-size: 15px;
        margin: 0 0 12px;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <h1>cobe isolation test — bright globe, no other WebGL</h1>
    <div class="stage">
      <canvas id="globe"></canvas>
    </div>
    <pre id="log">booting…</pre>

    <script type="module">
      const logEl = document.getElementById("log");
      const lines = [];
      const log = (msg, cls = "") => {
        lines.push(cls ? `<span class="${cls}">${msg}</span>` : msg);
        logEl.innerHTML = lines.join("\n");
      };

      // 1) Raw WebGL availability + GPU renderer (reveals software/blocked GPU).
      try {
        const probe = document.createElement("canvas");
        const gl = probe.getContext("webgl2") || probe.getContext("webgl");
        if (!gl) {
          log("RAW WebGL: NOT AVAILABLE — hardware accel likely OFF or GPU blocked", "bad");
        } else {
          log("RAW WebGL: available", "ok");
          const dbg = gl.getExtension("WEBGL_debug_renderer_info");
          const renderer = dbg ? gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL) : "(hidden)";
          const vendor = dbg ? gl.getParameter(dbg.UNMASKED_VENDOR_WEBGL) : "(hidden)";
          log(`GPU renderer: ${renderer}`);
          log(`GPU vendor:   ${vendor}`);
          const soft = /swiftshader|software|llvmpipe|basic/i.test(String(renderer));
          log(soft ? "→ SOFTWARE renderer (hardware accel disabled)" : "→ hardware GPU", soft ? "bad" : "ok");
        }
      } catch (e) {
        log("RAW WebGL probe threw: " + e.message, "bad");
      }

      // 2) How many live WebGL contexts can this tab hold right now?
      try {
        const held = [];
        for (let i = 0; i < 24; i++) {
          const c = document.createElement("canvas");
          const g = c.getContext("webgl");
          if (!g) break;
          held.push(g);
        }
        log(`Concurrent WebGL contexts available in THIS tab: ${held.length}`);
        // release the probes so they don't compete with the globe
        held.forEach((g) => g.getExtension("WEBGL_lose_context")?.loseContext());
      } catch (e) {
        log("context-count probe threw: " + e.message, "bad");
      }

      // 3) The actual cobe globe — BRIGHT colours, light mode, impossible to miss.
      try {
        const { default: createGlobe } = await import("cobe");
        log("cobe import: OK", "ok");

        const canvas = document.getElementById("globe");
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        canvas.width = 400 * dpr;
        canvas.height = 400 * dpr;
        let phi = 0;

        const globe = createGlobe(canvas, {
          devicePixelRatio: dpr,
          width: 400 * dpr,
          height: 400 * dpr,
          phi: 0,
          theta: 0.3,
          dark: 0,
          diffuse: 1.2,
          mapSamples: 16000,
          mapBrightness: 6,
          baseColor: [1, 1, 1],
          markerColor: [1, 0.4, 0.2],
          glowColor: [1, 1, 1],
          markers: [],
          onRender: (state) => {
            state.phi = phi;
            phi += 0.01;
          },
        });
        log("createGlobe: returned without throwing", "ok");

        // 4) Did cobe actually get a live context on the globe canvas?
        setTimeout(() => {
          const g = canvas.getContext("webgl") || canvas.getContext("webgl2");
          if (!g) {
            log("globe canvas: NO WebGL context (cobe failed silently)", "bad");
          } else if (g.isContextLost()) {
            log("globe canvas: context LOST after init", "bad");
          } else {
            log("globe canvas: live WebGL context ✓ — if you see no globe above, it is colour/render, not context", "ok");
          }
        }, 1200);
      } catch (e) {
        log("cobe path threw: " + e.message, "bad");
      }
    </script>
  </body>
</html>
