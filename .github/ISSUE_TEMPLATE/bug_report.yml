name: Bug report
description: Report a reproducible issue in Lastre
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Frontend / Vercel
        - Gateway / Render
        - Contracts / Casper
        - Sealer
        - Documentation
        - Design system
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Open...\n2. Click...\n3. See..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Logs, screenshots, endpoint responses, or commit SHA.
  - type: checkboxes
    id: guardrails
    attributes:
      label: Guardrails
      options:
        - label: I did not include secrets, keys, or private tokens.
          required: true
